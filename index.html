    <script>
        // Počkáme, až se načtou všechna písma, než zobrazíme tělo stránky

<body>

    <div class="screen">
        <h1 id="main-title">Péťa & Anička</h1>
        <div class="initials" style="font-size: 2.5rem; font-weight: bold; margin-bottom: 5px;">06. 06. 2026</div>

        <div class="heart-wrapper">
            <img src="listky.png" id="heart-background" class="hidden-at-start" alt="pozadi">
            <div class="invite-container">
                <div class="invite-text">
                    <h2>Budeš moje družička?<br>❤️</h2>

                    <div id="countdown" style="display: flex; justify-content: center; gap: 12px; margin-top: 5px; font-family: 'Montserrat', sans-serif;">
                        <div style="text-align: center; min-width: 35px;">
                            <span id="days" style="display: block; font-size: 1.4rem; font-weight: bold; color: #d27285;">00</span>
                            <small style="font-size: 0.4rem; text-transform: uppercase; color: #666;">Dní</small>
                        </div>
                        <div style="text-align: center; min-width: 45px;">
                            <span id="hours" style="display: block; font-size: 1.4rem; font-weight: bold; color: #d27285;">00</span>
                            <small style="font-size: 0.4rem; text-transform: uppercase; color: #666;">Hod</small>
                        </div>
                        <div style="text-align: center; min-width: 45px;">
                            <span id="minutes" style="display: block; font-size: 1.4rem; font-weight: bold; color: #d27285; ">00</span>
                            <small style="font-size: 0.4rem; text-transform: uppercase; color: #666;">Min</small>
                        </div>
                        <div style="text-align: center; min-width: 45px;">
                            <span id="seconds" style="display: block; font-size: 1.4rem; font-weight: bold; color: #d27285; ">00</span>
                            <small style="font-size: 0.4rem; text-transform: uppercase; color: #666;">Sek</small>
                        </div>
                    </div>
                </div>
            </div>

            <canvas id="scratch"></canvas>
        </div>

        <div id="info-button-container" class="hidden-info" style="display: none; opacity: 0;">
            <div class="info-pill">
                <span class="info-icon">ⓘ</span>
                <span class="info-text">Pro doladění dresscode se Vám ozveme</span>
            </div>
        </div>

        <p id="instruction">Setřete srdíčko</p>

        <div id="confetti-container"></div>

        <div id="button-container" class="hidden-buttons">
            <button class="btn btn-yes" onclick="answerYes()">Yes</button>

            <button class="btn btn-no" id="noBtn">No</button>
        </div>

    </div>
    <script src="script.js?v=6.88"></script>
